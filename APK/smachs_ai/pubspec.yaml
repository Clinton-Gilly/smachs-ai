name: smachs_ai
description: Smachs AI — RAG-powered mobile assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # HTTP & SSE streaming
  http: ^1.2.2

  # File upload (multipart)
  dio: ^5.7.0

  # File picker
  file_picker: ^8.1.2

  # Local storage
  shared_preferences: ^2.3.4

  # Markdown rendering
  flutter_markdown: ^0.7.4

  # Typography
  google_fonts: ^6.2.1

  # Date formatting
  intl: ^0.19.0

  # UUID generation
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

